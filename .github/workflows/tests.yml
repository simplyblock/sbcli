name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - R26.2-PRE

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install tox
        run: pip install tox
      - name: Run unit tests
        run: tox run -e unit -- -v

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install FoundationDB client library
        run: |
          curl -fsSL https://github.com/apple/foundationdb/releases/download/7.3.63/foundationdb-clients_7.3.63-1_amd64.deb -o /tmp/fdb-clients.deb
          sudo dpkg -i /tmp/fdb-clients.deb
      - name: Install tox
        run: pip install tox
      - name: Run integration tests
        run: tox run -e integration -- -v --durations=0
