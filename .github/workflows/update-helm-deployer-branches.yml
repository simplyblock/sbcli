name: Update Helm Deployer Branch Options

on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@master

      - name: Fetch branches from both repos
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api repos/simplyblock/sbcli/branches \
            --paginate --jq '.[].name' > /tmp/sbcli_branches.txt

          gh api repos/simplyblock/simplyblock-csi/branches \
            --paginate --jq '.[].name' > /tmp/csi_branches.txt

          echo "sbcli branches:"
          cat /tmp/sbcli_branches.txt

          echo "simplyblock-csi branches:"
          cat /tmp/csi_branches.txt

      - name: Update workflow options
        run: |
          pip install --quiet ruamel.yaml

          python3 << 'EOF'
          from ruamel.yaml import YAML

          yaml = YAML()
          yaml.preserve_quotes = True
          yaml.width = 4096  # prevent line wrapping

          workflow_path = '.github/workflows/docker-helm-deployer.yml'

          with open(workflow_path) as f:
              data = yaml.load(f)

          with open('/tmp/sbcli_branches.txt') as f:
              sbcli_branches = [b.strip() for b in f.readlines() if b.strip()]

          with open('/tmp/csi_branches.txt') as f:
              csi_branches = [b.strip() for b in f.readlines() if b.strip()]

          inputs = data['on']['workflow_dispatch']['inputs']
          inputs['sbcli_branch']['options'] = sbcli_branches
          inputs['csi_branch']['options'] = csi_branches

          with open(workflow_path, 'w') as f:
              yaml.dump(data, f)

          print(f"Updated sbcli options: {sbcli_branches}")
          print(f"Updated csi options: {csi_branches}")
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/docker-helm-deployer.yml
          git diff --cached --quiet && echo "No changes." || \
            (git commit -m "chore: sync branch options for helm deployer workflow" && git push)
