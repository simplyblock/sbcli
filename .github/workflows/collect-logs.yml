name: Collect Cluster Logs (Graylog / OpenSearch)
run-name: "Logs | ${{ inputs.DEPLOY_MODE }} | ${{ inputs.DEPLOY_MODE == 'k8s-native' && inputs.cluster_environment || inputs.MGMT_IP }} | ${{ inputs.START_TIME }} | ${{ inputs.DURATION_MINUTES }}m"

on:
  workflow_dispatch:
    inputs:
      # =========================
      # Deployment mode
      # =========================
      DEPLOY_MODE:
        description: "Deployment mode"
        required: true
        default: "docker"
        type: choice
        options:
          - docker
          - k8s-native

      # =========================
      # K8s-native settings
      # =========================
      cluster_environment:
        description: "Target cluster environment (k8s-native only)"
        required: false
        default: "local"
        type: choice
        options:
          - local
          - aws-openshift
          - openshift-local
          - gcp

      NAMESPACE:
        description: "Kubernetes namespace (k8s-native only)"
        required: false
        default: "simplyblock"

      # =========================
      # Docker / direct settings
      # =========================
      MGMT_IP:
        description: "Management node IP (docker mode, or fallback for k8s-native)"
        required: false
        default: "192.168.10.210"

      OPENSEARCH_IP:
        description: "OpenSearch IP (leave empty to use MGMT_IP; docker mode)"
        required: false
        default: ""

      GRAYLOG_IP:
        description: "Graylog IP (leave empty to use MGMT_IP; docker mode)"
        required: false
        default: ""

      CLUSTER_SECRET:
        description: "Cluster secret (Graylog admin password). If empty, auto-detected."
        required: false
        default: ""

      CLUSTER_ID:
        description: "Cluster UUID (if empty, auto-detected)"
        required: false
        default: ""

      # =========================
      # Time window
      # =========================
      START_TIME:
        description: "UTC start time (ISO-8601, e.g. 2026-06-27T21:59:00)"
        required: true

      DURATION_MINUTES:
        description: "Duration in minutes from start time"
        required: true
        default: "60"

      # =========================
      # Output
      # =========================
      OUTPUT_DIR:
        description: "Path on runner to write log files (default: /tmp/sb_collected_logs)"
        required: false
        default: "/tmp/sb_collected_logs"

      NFS_COPY_PATH:
        description: "Copy collected logs to this NFS path (e.g. /mnt/nfs_share). Leave empty to skip."
        required: false
        default: ""

      # =========================
      # SSH (docker mode only)
      # =========================
      SSH_USER:
        description: "SSH user for mgmt node (docker mode only)"
        required: false
        default: "root"

      KEY_PATH:
        description: "SSH private key path on runner (docker mode only)"
        required: false
        default: "/home/ec2-user/.ssh/simplyblock-us-east-2.pem"

      # =========================
      # Upload
      # =========================
      UPLOAD_TO_MINIO:
        description: "Upload collected logs to MinIO"
        required: false
        type: boolean
        default: false

concurrency:
  group: collect-logs-${{ inputs.DEPLOY_MODE == 'k8s-native' && inputs.cluster_environment || inputs.MGMT_IP }}
  cancel-in-progress: false

jobs:
  collect-logs:
    name: "Collect logs (${{ inputs.DEPLOY_MODE }}${{ inputs.DEPLOY_MODE == 'k8s-native' && format(' / {0}', inputs.cluster_environment) || '' }})"
    runs-on: ${{ inputs.DEPLOY_MODE == 'k8s-native' && inputs.cluster_environment == 'aws-openshift' && 'vm-runner-43' || 'self-hosted' }}
    timeout-minutes: 300

    env:
      MGMT_IP: ${{ inputs.MGMT_IP }}
      OPENSEARCH_IP: ${{ inputs.OPENSEARCH_IP }}
      GRAYLOG_IP: ${{ inputs.GRAYLOG_IP }}
      CLUSTER_SECRET: ${{ inputs.CLUSTER_SECRET }}
      CLUSTER_ID: ${{ inputs.CLUSTER_ID }}
      START_TIME: ${{ inputs.START_TIME }}
      DURATION_MINUTES: ${{ inputs.DURATION_MINUTES }}
      OUTPUT_DIR: ${{ inputs.OUTPUT_DIR }}
      DEPLOY_MODE: ${{ inputs.DEPLOY_MODE }}
      NAMESPACE: ${{ inputs.NAMESPACE || 'simplyblock' }}
      SSH_USER: ${{ inputs.SSH_USER }}
      KEY_PATH: ${{ inputs.KEY_PATH }}
      SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}

    steps:
      - name: Runner diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          uname -a
          whoami
          python3 --version || true
          pip3 install requests 2>/dev/null || true

      - name: Clone sbcli repo
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf sbcli
          wf_branch="${{ github.ref_name }}"
          fallback_branch="main"
          if git ls-remote --heads https://github.com/simplyblock-io/sbcli.git "$wf_branch" | grep -q "$wf_branch"; then
            git clone --branch "$wf_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          else
            git clone --branch "$fallback_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          fi

      # ============================================================
      # K8s-native: Setup kubeconfig
      # ============================================================
      - name: Setup kubeconfig
        if: inputs.DEPLOY_MODE == 'k8s-native'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$HOME/.kube"
          KUBECONFIG_FILE="$HOME/.kube/config-${{ github.run_id }}"
          echo "${KUBECONFIG_DATA}" > "$KUBECONFIG_FILE"
          chmod 600 "$KUBECONFIG_FILE"
          echo "KUBECONFIG=$KUBECONFIG_FILE" >> "$GITHUB_ENV"
        env:
          KUBECONFIG_DATA: ${{
            inputs.cluster_environment == 'aws-openshift' && secrets.KUBECONFIG_AWS_OPENSHIFT ||
            inputs.cluster_environment == 'openshift-local' && secrets.KUBECONFIG_OPENSHIFT_LOCAL ||
            inputs.cluster_environment == 'gcp' && secrets.KUBECONFIG_GCP ||
            secrets.KUBECONFIG_LOCAL || secrets.KUBECONFIG_CONTENT
            }}

      # ============================================================
      # K8s-native: Discover admin pod, IPs, cluster info
      # ============================================================
      - name: Discover cluster info (k8s-native)
        if: inputs.DEPLOY_MODE == 'k8s-native'
        shell: bash
        run: |
          set -euxo pipefail
          NAMESPACE="${{ inputs.NAMESPACE || 'simplyblock' }}"

          echo "=== Discovering admin pod(s) ==="
          ADMIN_PODS_ARR=()
          for i in $(seq 1 12); do
            ADMIN_PODS_ARR=()
            while IFS= read -r pod; do
              [ -z "${pod}" ] && continue
              PHASE=$(kubectl -n "${NAMESPACE}" get pod "${pod}" \
                -o jsonpath='{.status.phase}' 2>/dev/null) || true
              if [ "${PHASE}" = "Running" ]; then
                ADMIN_PODS_ARR+=("${pod}")
              fi
            done < <(kubectl -n "${NAMESPACE}" get pods \
              -l app=simplyblock-admin-control \
              -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null)
            if [ ${#ADMIN_PODS_ARR[@]} -gt 0 ]; then
              break
            fi
            echo "Waiting for admin pod (attempt ${i}/12)..."
            sleep 10
          done
          if [ ${#ADMIN_PODS_ARR[@]} -eq 0 ]; then
            echo "ERROR: No running admin pods found in namespace ${NAMESPACE}"
            exit 1
          fi
          echo "Found ${#ADMIN_PODS_ARR[@]} running admin pod(s): ${ADMIN_PODS_ARR[*]}"
          echo "ADMIN_PODS=${ADMIN_PODS_ARR[*]}" >> "$GITHUB_ENV"
          # Keep ADMIN_POD for cluster info discovery below
          ADMIN_POD="${ADMIN_PODS_ARR[0]}"
          echo "ADMIN_POD=${ADMIN_POD}" >> "$GITHUB_ENV"

          echo "=== Discovering Graylog / OpenSearch IPs ==="
          GL_IP=$(kubectl get svc -n "${NAMESPACE}" | grep graylog | awk '{print $3}')
          OS_IP=$(kubectl get svc opensearch-cluster-master -n "${NAMESPACE}" \
            -o jsonpath='{.spec.clusterIP}' 2>/dev/null || echo "")
          echo "Graylog ClusterIP: ${GL_IP}"
          echo "OpenSearch ClusterIP: ${OS_IP}"
          echo "GRAYLOG_IP=${GL_IP}" >> "$GITHUB_ENV"
          echo "OPENSEARCH_IP=${OS_IP}" >> "$GITHUB_ENV"

          echo "=== Discovering cluster ID and secret ==="
          cid=""
          csecret=""

          # Try JSON format first
          json_out=$(kubectl -n "${NAMESPACE}" exec "${ADMIN_POD}" -- \
            sbctl cluster list --json 2>/dev/null) || true
          if [ -n "${json_out}" ]; then
            cid=$(echo "${json_out}" | jq -r '.[0].id // .[0].uuid // .[0].UUID // empty' 2>/dev/null) || true
          fi

          # Fallback: table format
          if [ -z "${cid}" ] || [ "${cid}" = "null" ]; then
            table_out=$(kubectl -n "${NAMESPACE}" exec "${ADMIN_POD}" -- \
              sbctl cluster list 2>/dev/null) || true
            cid=$(echo "${table_out}" | awk 'NR==4{print $2}') || true
          fi

          if [ -n "${cid}" ] && [ "${cid}" != "null" ] && [ "${cid}" != "+" ]; then
            csecret=$(kubectl -n "${NAMESPACE}" exec "${ADMIN_POD}" -- \
              sbctl cluster get-secret "${cid}" 2>/dev/null) || true
          fi

          echo "Cluster ID: ${cid}"
          echo "CLUSTER_ID=${cid}" >> "$GITHUB_ENV"
          echo "CLUSTER_SECRET=${csecret}" >> "$GITHUB_ENV"

      # ============================================================
      # K8s-native: Deploy updated collect_logs.py into admin pods
      # ============================================================
      - name: Deploy collect_logs.py to admin pods
        if: inputs.DEPLOY_MODE == 'k8s-native'
        shell: bash
        run: |
          set -euxo pipefail
          NAMESPACE="${{ inputs.NAMESPACE || 'simplyblock' }}"
          SCRIPT_SRC="sbcli/scripts/collect_logs.py"
          SCRIPT_DST="/usr/local/lib/python3.12/site-packages/simplyblock_core/scripts/collect_logs.py"

          if [ ! -f "${SCRIPT_SRC}" ]; then
            echo "WARN: ${SCRIPT_SRC} not found, using pod's built-in version"
            exit 0
          fi

          IFS=' ' read -ra PODS <<< "${ADMIN_PODS}"
          for pod in "${PODS[@]}"; do
            echo "Copying collect_logs.py to ${pod} ..."
            kubectl -n "${NAMESPACE}" cp "${SCRIPT_SRC}" "${pod}:${SCRIPT_DST}" 2>&1 || \
              echo "WARN: failed to copy to ${pod}, will use built-in version"
          done
          echo "Deployed updated collect_logs.py to ${#PODS[@]} pod(s)"

      # ============================================================
      # K8s-native: Collect logs via kubectl exec (reverse, chunked)
      # ============================================================
      - name: Collect logs (k8s-native)
        if: inputs.DEPLOY_MODE == 'k8s-native'
        timeout-minutes: 240
        shell: bash
        run: |
          set -euxo pipefail
          NAMESPACE="${{ inputs.NAMESPACE || 'simplyblock' }}"
          LOCAL_OUTPUT_DIR="${OUTPUT_DIR}"
          mkdir -p "${LOCAL_OUTPUT_DIR}"

          echo "=== Collecting logs via admin pods (reverse, chunked, parallel) ==="

          # Parse admin pods into array
          IFS=' ' read -ra PODS <<< "${ADMIN_PODS}"
          NUM_PODS=${#PODS[@]}

          echo "  Namespace:  ${NAMESPACE}"
          echo "  Admin pods: ${PODS[*]} (${NUM_PODS} pod(s))"
          echo "  Start time: ${START_TIME}"
          echo "  Duration:   ${DURATION_MINUTES} min"

          # Convert START_TIME to epoch
          WINDOW_START=$(date -u -d "${START_TIME}" "+%s" 2>/dev/null || \
            python3 -c "from datetime import datetime,timezone; print(int(datetime.fromisoformat('${START_TIME}'.replace(' ','T')).replace(tzinfo=timezone.utc).timestamp()))")
          WINDOW_END=$((WINDOW_START + DURATION_MINUTES * 60))

          echo "  Window: $(date -u -d @${WINDOW_START} '+%Y-%m-%dT%H:%M:%S' 2>/dev/null || echo ${WINDOW_START}) -> $(date -u -d @${WINDOW_END} '+%Y-%m-%dT%H:%M:%S' 2>/dev/null || echo ${WINDOW_END})"

          epoch_to_iso() {
            local ep=$1
            local iso
            iso=$(date -u -d "@${ep}" "+%Y-%m-%dT%H:%M:%S" 2>/dev/null)
            if [ -z "${iso}" ]; then
              iso=$(python3 -c "from datetime import datetime,timezone; print(datetime.fromtimestamp(${ep},tz=timezone.utc).strftime('%Y-%m-%dT%H:%M:%S'))")
            fi
            echo "${iso}"
          }

          # Helper: run collect_logs.py inside a specific admin pod
          # $5 = pod (default: first pod)
          run_collect() {
            local iso=$1 mins=$2 outdir=$3 extra_flag=${4:-} pod=${5:-${PODS[0]}}
            local mgmt_ip_to_use="${GRAYLOG_IP}"
            if [[ "${extra_flag}" == *"--use-opensearch"* ]] && [ -n "${OPENSEARCH_IP}" ]; then
              mgmt_ip_to_use="${OPENSEARCH_IP}"
            fi
            kubectl -n "${NAMESPACE}" exec "${pod}" -- \
              python3 /usr/local/lib/python3.12/site-packages/simplyblock_core/scripts/collect_logs.py \
                "${iso}" "${mins}" \
                --mode kubernetes \
                --namespace "${NAMESPACE}" \
                --monitoring-secret "${MON_SECRET}" \
                --output-dir "${outdir}" \
                ${extra_flag} \
                ${mgmt_ip_to_use:+--mgmt-ip "${mgmt_ip_to_use}"} \
                ${CLUSTER_ID:+--cluster-id "${CLUSTER_ID}"} \
            2>&1
            local rc=$?
            [ $rc -ne 0 ] && return $rc
            local has_content
            has_content=$(kubectl -n "${NAMESPACE}" exec "${pod}" -- \
              find "${outdir}" -name "*.tar.gz" -size +0 2>/dev/null | head -1)
            if [ -z "${has_content}" ]; then
              echo "  WARN: collect_logs.py succeeded but no .tar.gz output found"
              return 1
            fi
          }

          # Adaptive collection with pod parameter
          # $5 = pod (default: first pod)
          collect_adaptive() {
            local start_epoch=$1 end_epoch=$2 outdir=$3 extra_flag=${4:-} pod=${5:-${PODS[0]}}
            local duration=$((end_epoch - start_epoch))
            local mins=$(( (duration + 59) / 60 ))
            local iso=$(epoch_to_iso ${start_epoch})
            if run_collect "${iso}" "${mins}" "${outdir}" "${extra_flag}" "${pod}"; then
              return 0
            fi
            echo "  WARN: ${mins}m window failed on ${pod}, retrying with 5-min sub-windows..."
            local sub_start=${start_epoch}
            while [ ${sub_start} -lt ${end_epoch} ]; do
              local sub_end=$((sub_start + 300))
              [ ${sub_end} -gt ${end_epoch} ] && sub_end=${end_epoch}
              local sub_mins=$(( ((sub_end - sub_start) + 59) / 60 ))
              local sub_iso=$(epoch_to_iso ${sub_start})
              if ! run_collect "${sub_iso}" "${sub_mins}" "${outdir}" "${extra_flag}" "${pod}"; then
                echo "  WARN: 5-min window at ${sub_iso} failed on ${pod}, retrying with 1-min windows..."
                local micro_start=${sub_start}
                while [ ${micro_start} -lt ${sub_end} ]; do
                  local micro_end=$((micro_start + 60))
                  [ ${micro_end} -gt ${sub_end} ] && micro_end=${sub_end}
                  local micro_mins=$(( ((micro_end - micro_start) + 59) / 60 ))
                  local micro_iso=$(epoch_to_iso ${micro_start})
                  run_collect "${micro_iso}" "${micro_mins}" "${outdir}" "${extra_flag}" "${pod}" || \
                    echo "  WARN: 1-min window at ${micro_iso} also failed on ${pod}"
                  micro_start=${micro_end}
                done
              fi
              sub_start=${sub_end}
            done
          }

          # Process a single chunk on a given pod, copy results to LOCAL_OUTPUT_DIR
          process_chunk() {
            local chunk_num=$1 chunk_start=$2 chunk_end=$3 pod=$4 prefer_graylog=$5
            local chunk_minutes=$(( ((chunk_end - chunk_start) + 59) / 60 ))
            local chunk_iso=$(epoch_to_iso ${chunk_start})
            local pod_output_dir="/tmp/graylog_collect_chunk${chunk_num}"

            echo ""
            echo "--- Chunk ${chunk_num}/${NUM_CHUNKS}: ${chunk_iso} for ${chunk_minutes}m on pod ${pod} ---"

            kubectl -n "${NAMESPACE}" exec "${pod}" -- mkdir -p "${pod_output_dir}" 2>/dev/null || true

            if [ "${prefer_graylog}" = "true" ]; then
              collect_adaptive ${chunk_start} ${chunk_end} "${pod_output_dir}" "" "${pod}" || {
                echo "WARN: Graylog failed for chunk ${chunk_num} on ${pod}, falling back to OpenSearch..."
                collect_adaptive ${chunk_start} ${chunk_end} "${pod_output_dir}" "--use-opensearch" "${pod}" || \
                  echo "WARN: OpenSearch fallback also failed for chunk ${chunk_num}"
              }
            else
              collect_adaptive ${chunk_start} ${chunk_end} "${pod_output_dir}" "--use-opensearch" "${pod}" || {
                echo "WARN: OpenSearch failed for chunk ${chunk_num} on ${pod}, falling back to Graylog..."
                collect_adaptive ${chunk_start} ${chunk_end} "${pod_output_dir}" "" "${pod}" || \
                  echo "WARN: Graylog fallback also failed for chunk ${chunk_num}"
              }
            fi

            # Copy tarballs from pod to runner
            local tarballs
            tarballs=$(kubectl -n "${NAMESPACE}" exec "${pod}" -- \
              find "${pod_output_dir}" -name "*.tar.gz" -type f 2>/dev/null) || true
            if [ -n "${tarballs}" ]; then
              for tb in ${tarballs}; do
                local tb_name=$(basename "${tb}")
                echo "  [${pod}] Copying ${tb_name}..."
                kubectl -n "${NAMESPACE}" cp "${pod}:${tb}" "${LOCAL_OUTPUT_DIR}/${tb_name}" 2>&1 || true
              done
            else
              echo "WARN: No tarballs found for chunk ${chunk_num} on ${pod}"
            fi

            # Cleanup this chunk in pod
            kubectl -n "${NAMESPACE}" exec "${pod}" -- rm -rf "${pod_output_dir}" 2>/dev/null || true
          }

          # Build 1-hour chunk boundaries
          _CHUNK_STARTS=()
          _C=${WINDOW_START}
          while [ ${_C} -lt ${WINDOW_END} ]; do
            _CHUNK_STARTS+=(${_C})
            _C=$((_C + 3600))
          done
          NUM_CHUNKS=${#_CHUNK_STARTS[@]}

          # ── FIRST CHUNK: synchronous probe to determine preferred backend ──
          CHUNK=0
          FIRST_IDX=$((NUM_CHUNKS - 1))
          CHUNK=$((CHUNK + 1))
          FIRST_START=${_CHUNK_STARTS[$FIRST_IDX]}
          FIRST_END=$((FIRST_START + 3600))
          [ ${FIRST_END} -gt ${WINDOW_END} ] && FIRST_END=${WINDOW_END}
          FIRST_MINUTES=$(( ((FIRST_END - FIRST_START) + 59) / 60 ))
          FIRST_ISO=$(epoch_to_iso ${FIRST_START})

          echo ""
          echo "--- Chunk 1/${NUM_CHUNKS}: ${FIRST_ISO} for ${FIRST_MINUTES}m (probe on ${PODS[0]}) ---"

          PROBE_DIR="/tmp/graylog_collect_chunk1"
          kubectl -n "${NAMESPACE}" exec "${PODS[0]}" -- mkdir -p "${PROBE_DIR}" 2>/dev/null || true

          PREFER_GRAYLOG=""
          echo "  Probing Graylog availability..."
          if run_collect "${FIRST_ISO}" "${FIRST_MINUTES}" "${PROBE_DIR}" "" "${PODS[0]}"; then
            PREFER_GRAYLOG=true
            echo "  Graylog works — using it for all chunks"
          else
            PREFER_GRAYLOG=false
            echo "  Graylog unavailable — trying OpenSearch for all chunks"
            kubectl -n "${NAMESPACE}" exec "${PODS[0]}" -- rm -rf "${PROBE_DIR}" 2>/dev/null || true
            kubectl -n "${NAMESPACE}" exec "${PODS[0]}" -- mkdir -p "${PROBE_DIR}" 2>/dev/null || true
            collect_adaptive ${FIRST_START} ${FIRST_END} "${PROBE_DIR}" "--use-opensearch" "${PODS[0]}" || \
              echo "WARN: OpenSearch also failed for chunk 1"
          fi

          # Copy first chunk results
          TARBALLS=$(kubectl -n "${NAMESPACE}" exec "${PODS[0]}" -- \
            find "${PROBE_DIR}" -name "*.tar.gz" -type f 2>/dev/null) || true
          if [ -n "${TARBALLS}" ]; then
            for TB in ${TARBALLS}; do
              TB_NAME=$(basename "${TB}")
              echo "  Copying ${TB_NAME}..."
              kubectl -n "${NAMESPACE}" cp "${PODS[0]}:${TB}" "${LOCAL_OUTPUT_DIR}/${TB_NAME}" 2>&1 || true
            done
          else
            echo "WARN: No tarballs found for chunk 1"
          fi
          kubectl -n "${NAMESPACE}" exec "${PODS[0]}" -- rm -rf "${PROBE_DIR}" 2>/dev/null || true

          # ── REMAINING CHUNKS: parallel across admin pods ──
          if [ ${NUM_CHUNKS} -gt 1 ]; then
            REMAINING=$((NUM_CHUNKS - 1))
            echo ""
            echo "=== Processing remaining ${REMAINING} chunk(s) in parallel across ${NUM_PODS} pod(s) ==="

            BATCH_PIDS=()
            BATCH_CHUNKS=()

            for (( _IDX=FIRST_IDX-1; _IDX>=0; _IDX-- )); do
              CHUNK=$((CHUNK + 1))
              C_START=${_CHUNK_STARTS[$_IDX]}
              C_END=$((C_START + 3600))
              [ ${C_END} -gt ${WINDOW_END} ] && C_END=${WINDOW_END}

              # Round-robin pod assignment within each batch
              POD_IDX=$(( ${#BATCH_PIDS[@]} % NUM_PODS ))
              POD=${PODS[$POD_IDX]}

              process_chunk ${CHUNK} ${C_START} ${C_END} "${POD}" "${PREFER_GRAYLOG}" &
              BATCH_PIDS+=($!)
              BATCH_CHUNKS+=("${CHUNK}")

              # Wait for batch when all pods are busy or last chunk
              if [ ${#BATCH_PIDS[@]} -ge ${NUM_PODS} ] || [ ${_IDX} -eq 0 ]; then
                echo ""
                echo "  Waiting for batch (chunks: ${BATCH_CHUNKS[*]}) on ${#BATCH_PIDS[@]} pod(s)..."
                for pid in "${BATCH_PIDS[@]}"; do
                  wait ${pid} || true
                done
                echo "  Batch complete."
                BATCH_PIDS=()
                BATCH_CHUNKS=()
              fi
            done
          fi

          # Extract all tarballs
          echo ""
          echo "=== Extracting tarballs ==="
          for TB_FILE in "${LOCAL_OUTPUT_DIR}"/*.tar.gz; do
            [ -f "${TB_FILE}" ] && tar -xzf "${TB_FILE}" -C "${LOCAL_OUTPUT_DIR}/" 2>/dev/null || true
          done

          echo ""
          echo "=== Log collection complete (${NUM_CHUNKS} chunks, ${NUM_PODS} pod(s), newest-first): ${LOCAL_OUTPUT_DIR} ==="
          ls -la "${LOCAL_OUTPUT_DIR}/" 2>/dev/null || echo "(empty)"
        env:
          MON_SECRET: ${{ secrets.MON_SECRET }}

      # ============================================================
      # Docker: Resolve cluster secret via SSH
      # ============================================================
      - name: Resolve cluster secret (docker)
        if: inputs.DEPLOY_MODE == 'docker'
        shell: bash
        run: |
          set -euxo pipefail
          if [[ -n "${CLUSTER_SECRET}" ]]; then
            echo "Using provided CLUSTER_SECRET"
            exit 0
          fi

          SSH_OPTS=(-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10)
          if [[ -n "${KEY_PATH}" && -f "${KEY_PATH}" ]]; then
            SSH_OPTS+=(-i "${KEY_PATH}")
          fi

          remote_cmd() {
            if [[ -n "${SSH_PASSWORD:-}" ]]; then
              sshpass -p "${SSH_PASSWORD}" ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" "bash -lc '$1'"
            else
              ssh "${SSH_OPTS[@]}" "${SSH_USER}@${MGMT_IP}" "bash -lc '$1'"
            fi
          }

          cid="${CLUSTER_ID}"
          if [[ -z "$cid" ]]; then
            cid="$(remote_cmd 'sbctl cluster list --json' 2>/dev/null | python3 -c 'import sys,json; print(json.load(sys.stdin)[0]["UUID"])' 2>/dev/null || true)"
          fi

          if [[ -z "$cid" ]]; then
            echo "ERROR: Could not determine cluster ID. Provide CLUSTER_SECRET or ensure sbctl is configured on ${MGMT_IP}."
            exit 1
          fi

          secret="$(remote_cmd "sbctl cluster get-secret $cid" 2>/dev/null || true)"
          if [[ -z "$secret" ]]; then
            echo "ERROR: Could not retrieve cluster secret for $cid from ${MGMT_IP}"
            exit 1
          fi

          echo "CLUSTER_SECRET=${secret}" >> "$GITHUB_ENV"
          echo "CLUSTER_ID=${cid}" >> "$GITHUB_ENV"
          echo "Auto-detected cluster $cid from ${MGMT_IP}"

      # ============================================================
      # Docker: Collect logs via test_graylog_export.py
      # ============================================================
      - name: Collect logs (docker)
        if: inputs.DEPLOY_MODE == 'docker'
        timeout-minutes: 120
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "${OUTPUT_DIR}"
          python3 sbcli/e2e/utils/test_graylog_export.py

      # ============================================================
      # Common: Copy to NFS (if configured)
      # ============================================================
      - name: Copy logs to NFS
        if: always() && inputs.NFS_COPY_PATH != ''
        shell: bash
        run: |
          set -euxo pipefail
          NFS_BASE="${{ inputs.NFS_COPY_PATH }}"

          if [ ! -d "${NFS_BASE}" ]; then
            echo "WARN: NFS path ${NFS_BASE} does not exist or is not mounted, skipping copy"
            exit 0
          fi

          TIMESTAMP=$(date -u "+%Y%m%d-%H%M%S")
          NFS_DEST="${NFS_BASE}/graylog_collected-${TIMESTAMP}"
          mkdir -p "${NFS_DEST}"

          echo "=== Copying collected logs to NFS ==="
          echo "  Source: ${OUTPUT_DIR}"
          echo "  Dest:   ${NFS_DEST}"

          cp -r "${OUTPUT_DIR}/"* "${NFS_DEST}/" 2>/dev/null || true

          file_count=$(find "${NFS_DEST}" -type f 2>/dev/null | wc -l || echo 0)
          total_size=$(du -sh "${NFS_DEST}" 2>/dev/null | awk '{print $1}' || echo 'unknown')
          echo "  Copied ${file_count} files (${total_size}) to ${NFS_DEST}"
          echo "NFS_DEST=${NFS_DEST}" >> "$GITHUB_ENV"

      # ============================================================
      # Common: Job summary
      # ============================================================
      - name: Write Job Summary
        if: always()
        shell: bash
        run: |
          set -euxo pipefail

          os_ip="${OPENSEARCH_IP:-$MGMT_IP}"
          gl_ip="${GRAYLOG_IP:-$MGMT_IP}"
          file_count="$(find "${OUTPUT_DIR}" -type f \( -name '*.log' -o -name '*.tar.gz' \) 2>/dev/null | wc -l || echo 0)"
          total_size="$(du -sh "${OUTPUT_DIR}" 2>/dev/null | awk '{print $1}' || echo 'unknown')"
          total_lines="$(cat "${OUTPUT_DIR}"/*.log 2>/dev/null | wc -l || echo 0)"

          {
            echo "## Log Collection Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Deploy Mode** | \`${DEPLOY_MODE}\` |"
            if [[ "${DEPLOY_MODE}" == "k8s-native" ]]; then
              echo "| **Cluster Environment** | \`${{ inputs.cluster_environment }}\` |"
              echo "| **Namespace** | \`${NAMESPACE}\` |"
            fi
            echo "| **Graylog IP** | \`${gl_ip}\` |"
            echo "| **OpenSearch IP** | \`${os_ip}\` |"
            echo "| **Time Window** | \`${START_TIME}\` + ${DURATION_MINUTES} min |"
            echo "| **Output Dir** | \`${OUTPUT_DIR}\` |"
            if [ -n "${NFS_DEST:-}" ]; then
              echo "| **NFS Copy** | \`${NFS_DEST}\` |"
            fi
            echo "| **Log Files** | ${file_count} |"
            echo "| **Total Size** | ${total_size} |"
            echo "| **Total Lines** | ${total_lines} |"
            echo ""
            echo "### Files Collected"
            echo '```'
            find "${OUTPUT_DIR}" -type f \( -name '*.log' -o -name '*.tar.gz' \) -printf '%P  (%s bytes)\n' 2>/dev/null | sort || echo "(none)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ============================================================
      # Common: Upload
      # ============================================================
      - name: Upload logs to MinIO
        if: inputs.UPLOAD_TO_MINIO == true && always()
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -z "${MINIO_ACCESS_KEY}" || -z "${MINIO_SECRET_KEY}" ]]; then
            echo "WARN: MINIO_ACCESS_KEY / MINIO_SECRET_KEY not set, skipping upload"
            exit 0
          fi

          python3 sbcli/e2e/logs/upload_logs_to_miniio_parallel.py \
            --access_key "${MINIO_ACCESS_KEY}" \
            --secret_key "${MINIO_SECRET_KEY}" \
            --source_dir "${OUTPUT_DIR}" \
            --run_id "collected-logs-$(date +%Y%m%d_%H%M%S)" || true

      - name: Upload as GitHub artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: collected-logs-${{ inputs.DEPLOY_MODE }}-${{ inputs.DEPLOY_MODE == 'k8s-native' && inputs.cluster_environment || inputs.MGMT_IP }}-${{ github.run_id }}
          path: ${{ inputs.OUTPUT_DIR }}/**
          if-no-files-found: warn

      # ============================================================
      # K8s-native: Cleanup kubeconfig
      # ============================================================
      - name: Cleanup kubeconfig
        if: inputs.DEPLOY_MODE == 'k8s-native' && always()
        shell: bash
        run: |
          rm -f "$HOME/.kube/config-${{ github.run_id }}" 2>/dev/null || true
