name: Monitoring Suite (Bootstrap + Multi-Test Comparison)
run-name: "Monitoring | ${{ inputs.SBCLI_BRANCH }} | ${{ inputs.TEST_CLASSES }} | NDCS:${{ inputs.NDCS }} NPCS:${{ inputs.NPCS }}"

on:
  workflow_dispatch:
    inputs:
      # =========================
      # Test selection
      # =========================
      TEST_CLASSES:
        description: "Comma-separated monitoring test class names"
        required: true
        default: "TestParallelNamespaceLvolDocker,BulkLvolDeleteDocker,LargeScaleLvolDocker"

      # =========================
      # Cluster / Lab inputs
      # =========================
      K3S_MNODES:
        description: "K3s master node IP (also used as API endpoint)"
        required: true
        default: "192.168.10.81"

      STORAGE_PRIVATE_IPS:
        description: "Space-separated storage node IPs (K8s worker nodes)"
        required: true
        default: "192.168.10.82 192.168.10.83 192.168.10.84"

      API_INVOKE_URL:
        description: "Cluster API URL (default: http://<K3S_MNODES>/)"
        required: false
        default: ""

      GRAFANA_ENDPOINT:
        description: "Grafana endpoint"
        required: false
        default: ""

      SBCLI_BRANCH:
        description: "sbcli repo branch for test code"
        required: true
        default: "main"

      K8S_CHARTS_BRANCH:
        description: "sbcli branch that contains simplyblock_core/scripts/charts"
        required: false
        default: "main-sfam-2359"

      K8S_NAMESPACE:
        description: "Kubernetes namespace for simplyblock"
        required: false
        default: "simplyblock"

      # =========================
      # SSH / client inputs
      # =========================
      SSH_USER:
        description: "SSH user for all nodes"
        required: true
        default: "root"

      KEY_PATH:
        description: "SSH private key path on runner"
        required: true
        default: "/home/ec2-user/.ssh/simplyblock-us-east-2.pem"

      CLIENTNODES:
        description: "Space-separated client node IPs"
        required: true
        default: "192.168.10.165 192.168.10.166"

      # =========================
      # Cleanup inputs
      # =========================
      NFS_MOUNTPOINT:
        description: "NFS mountpoint to unmount everywhere"
        required: true
        default: "/mnt/nfs_share"

      # =========================
      # Bootstrap params
      # =========================
      BOOTSTRAP_DATA_NIC:
        description: "Data NIC on storage nodes (passed to k3s bootstrap)"
        required: true
        default: "eth1"

      EXTRA_HELM_ARGS:
        description: "Extra --set flags for helm upgrade --install (space-separated)"
        required: false
        default: ""

      # =========================
      # Geometry / stress params
      # =========================
      NDCS:
        description: "ndcs passed to stress.py"
        required: false
        default: "2"

      NPCS:
        description: "npcs passed to stress.py"
        required: false
        default: "2"

      RUN_K8S:
        description: "Pass --run_k8s True to stress.py (for K8s-mode tests)"
        type: boolean
        required: false
        default: false

      CUSTOM_IMAGES:
        description: "Image overrides: set spdk and/or docker values, leave as \"\" to skip."
        default: 'spdk="" docker=""'
        required: false

concurrency:
  group: simplyblock-monitoring-${{ inputs.K3S_MNODES }}
  cancel-in-progress: false

# ============================================================================
# JOBS
# ============================================================================
jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Parse TEST_CLASSES into a JSON matrix
  # ─────────────────────────────────────────────────────────────────────────
  setup-matrix:
    name: Parse test list
    runs-on: [self-hosted]
    outputs:
      test_matrix: ${{ steps.parse.outputs.matrix }}
      test_count: ${{ steps.parse.outputs.count }}
    steps:
      - name: Convert TEST_CLASSES to JSON array
        id: parse
        shell: bash
        run: |
          set -euo pipefail
          IFS=',' read -ra tests <<< "${{ inputs.TEST_CLASSES }}"
          json="["
          for i in "${!tests[@]}"; do
            t=$(echo "${tests[$i]}" | xargs)
            [[ -z "$t" ]] && continue
            [[ $i -gt 0 ]] && json+=","
            json+="\"$t\""
          done
          json+="]"
          echo "matrix=${json}" >> "$GITHUB_OUTPUT"
          echo "count=${#tests[@]}" >> "$GITHUB_OUTPUT"
          echo "Parsed ${#tests[@]} tests: ${json}"

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Sequential test runs — full bootstrap + test per matrix entry
  # ─────────────────────────────────────────────────────────────────────────
  run-tests:
    name: "Run: ${{ matrix.test }}"
    needs: setup-matrix
    runs-on: [self-hosted]
    timeout-minutes: 4320
    strategy:
      matrix:
        test: ${{ fromJson(needs.setup-matrix.outputs.test_matrix) }}
      max-parallel: 1
      fail-fast: false

    env:
      K3S_MNODES:          ${{ inputs.K3S_MNODES }}
      MNODES:              ${{ inputs.K3S_MNODES }}
      STORAGE_PRIVATE_IPS: ${{ inputs.STORAGE_PRIVATE_IPS }}
      BASTION_SERVER:      ${{ inputs.K3S_MNODES }}
      BASTION_IP:          ${{ inputs.K3S_MNODES }}
      K8S_NAMESPACE:       ${{ inputs.K8S_NAMESPACE || 'simplyblock' }}
      GRAFANA_ENDPOINT:    ${{ inputs.GRAFANA_ENDPOINT || '' }}
      SBCLI_CMD:           'sbctl'
      SBCLI_BRANCH:        ${{ inputs.SBCLI_BRANCH }}
      K8S_CHARTS_BRANCH:   ${{ inputs.K8S_CHARTS_BRANCH || 'main-sfam-2359' }}
      BOOTSTRAP_DATA_NIC:  ${{ inputs.BOOTSTRAP_DATA_NIC }}
      EXTRA_HELM_ARGS:     ${{ inputs.EXTRA_HELM_ARGS || '' }}
      SSH_USER:            ${{ inputs.SSH_USER }}
      KEY_PATH:            ${{ inputs.KEY_PATH }}
      CLIENTNODES:         ${{ inputs.CLIENTNODES }}
      CLIENT_IP:           ${{ inputs.CLIENTNODES }}
      NFS_MOUNTPOINT:      ${{ inputs.NFS_MOUNTPOINT }}
      TEST_CLASS:          ${{ matrix.test }}
      NDCS:                ${{ inputs.NDCS || '2' }}
      NPCS:                ${{ inputs.NPCS || '2' }}
      CUSTOM_IMAGES:       ${{ inputs.CUSTOM_IMAGES || 'spdk="" docker=""' }}
      SSH_PASSWORD:        ${{ secrets.SSH_PASSWORD }}
      SLACK_WEBHOOK_URL:   ${{ secrets.SLACK_WEBHOOK_URL }}
      MINIO_ACCESS_KEY:    ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY:    ${{ secrets.MINIO_SECRET_KEY }}
      SUPABASE_ANON_KEY:   ${{ secrets.SUPABASE_ANON_KEY }}
      API_BASE_URL:        ""
      API_INVOKE_URL:      ""
      CLUSTER_ID:          ""
      CLUSTER_SECRET:      ""

    steps:
      - name: Runner diagnostics
        shell: bash
        run: |
          set -euxo pipefail
          echo "=== Running test: ${TEST_CLASS} ==="
          uname -a; whoami; pwd
          python3 --version || true

      # ============================================================
      # TOOL INSTALL
      # ============================================================
      - name: Install kubectl (if missing)
        shell: bash
        run: |
          set -euxo pipefail
          if command -v kubectl >/dev/null 2>&1; then echo "kubectl present"; exit 0; fi
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Install helm (if missing)
        shell: bash
        run: |
          set -euxo pipefail
          if command -v helm >/dev/null 2>&1; then echo "helm present"; exit 0; fi
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Install sshpass (if missing)
        shell: bash
        run: |
          set -euxo pipefail
          if command -v sshpass >/dev/null 2>&1; then exit 0; fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -y && sudo apt-get install -y sshpass
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y epel-release || true && sudo yum install -y sshpass
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y sshpass
          else
            echo "ERROR: Cannot install sshpass" && exit 1
          fi

      # ============================================================
      # IMAGE OVERRIDES
      # ============================================================
      - name: Parse CUSTOM_IMAGES overrides
        shell: bash
        run: |
          set -euxo pipefail
          custom="${{ inputs.CUSTOM_IMAGES }}"
          for item in $custom; do
            key="${item%%=*}"; value="${item#*=}"; value="${value//\"/}"
            [[ -z "$value" ]] && continue
            case "$key" in
              spdk)   echo "SIMPLY_BLOCK_SPDK_ULTRA_IMAGE=$value" >> "$GITHUB_ENV" ;;
              docker) echo "SIMPLY_BLOCK_DOCKER_IMAGE=$value"     >> "$GITHUB_ENV" ;;
            esac
          done

      # ============================================================
      # KEY SETUP
      # ============================================================
      - name: Resolve SSH KEY_PATH
        shell: bash
        run: |
          set -euxo pipefail
          kp="${KEY_PATH}"; kp="${kp%\"}"; kp="${kp#\"}"; kp="${kp%\'}"; kp="${kp#\'}"
          [[ "$kp" == .ssh/* ]]  && kp="${HOME}/${kp}"
          [[ "$kp" == ~/* ]]     && kp="${HOME}/${kp#~/}"
          echo "KEY_PATH=$kp" >> "$GITHUB_ENV"
          test -f "$kp" || (echo "ERROR: SSH key not found at $kp" && exit 1)
          chmod 600 "$kp" || true

      - name: Validate secrets
        shell: bash
        run: |
          set -euxo pipefail
          [[ -n "${SSH_PASSWORD}" ]] || (echo "ERROR: secrets.SSH_PASSWORD required" && exit 1)

      # ============================================================
      # PRE-BOOTSTRAP CLEANUP
      # ============================================================
      - name: "Pre-clean: kill fio/tmux + unmount NFS"
        shell: bash
        run: |
          set -euxo pipefail
          run_remote() {
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@$1" "bash -s" <<< "$2"
          }
          targets="$K3S_MNODES $STORAGE_PRIVATE_IPS $CLIENTNODES"
          for ip in $(echo "$targets" | tr ' ' '\n' | sort -u); do
            [[ -z "$ip" ]] && continue
            echo "---- $ip: kill fio/tmux + umount NFS ----"
            run_remote "$ip" "set -euxo pipefail
              pkill -9 fio || true; pkill -9 tmux || true
              mp='${NFS_MOUNTPOINT}'
              if mountpoint -q \"\$mp\" 2>/dev/null; then umount -f \"\$mp\" || true
              elif mount | grep -q \" \$mp \"; then umount -f \"\$mp\" || true; fi" || true
          done

      - name: "Pre-clean: uninstall k3s"
        shell: bash
        run: |
          set -euxo pipefail
          run_remote() {
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@$1" "bash -s" <<< "$2"
          }
          echo "---- k3s master uninstall: $K3S_MNODES ----"
          run_remote "$K3S_MNODES" "set -euxo pipefail
            systemctl stop firewalld || true; systemctl stop ufw || true
            sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true
            k3s-uninstall.sh || true
            docker stop \$(docker ps -aq) || true
            docker rm -f \$(docker ps -aq) || true
            docker system prune -af || true
            pip uninstall -y sbctl || true
            rm -rf /usr/local/bin/sbc* || true" || true
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "---- k3s agent uninstall: $ip ----"
            run_remote "$ip" "set -euxo pipefail
              systemctl stop firewalld || true; systemctl stop ufw || true
              sysctl -w net.ipv6.conf.all.disable_ipv6=1 || true
              k3s-agent-uninstall.sh || true
              docker stop \$(docker ps -aq) || true
              docker rm -f \$(docker ps -aq) || true
              docker system prune -af || true
              pip uninstall -y sbctl || true
              rm -rf /usr/local/bin/sbc* || true" || true
            sleep 10
          done

      - name: "Pre-clean: disconnect lvols on clients"
        shell: bash
        run: |
          set -euxo pipefail
          run_remote() {
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@$1" "bash -s" <<< "$2"
          }
          for ip in $CLIENTNODES; do
            echo "---- client disconnect: $ip ----"
            run_remote "$ip" "set -euxo pipefail
              subsystems=\$(nvme list-subsys 2>/dev/null | grep -i lvol | awk '{print \$3}' | cut -d '=' -f 2 || true)
              for s in \$subsystems; do nvme disconnect -n \"\$s\" || true; done
              mps=\$(mount | grep ' /mnt' | awk '{print \$3}' || true)
              for mp in \$mps; do umount -f \"\$mp\" || true; done
              dirs=\$(find /mnt -mindepth 1 -type d 2>/dev/null || true)
              for d in \$dirs; do rm -rf \"\$d\" || true; done" || true
          done

      - name: "Pre-clean: remove /etc/simplyblock"
        shell: bash
        run: |
          set -euxo pipefail
          run_remote() {
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@$1" "bash -s" <<< "$2"
          }
          for ip in $K3S_MNODES $STORAGE_PRIVATE_IPS; do
            run_remote "$ip" "rm -rf /etc/simplyblock || true" || true
          done

      - name: Reboot storage nodes + wait online + disk reset
        shell: bash
        run: |
          set -euxo pipefail
          run_remote() {
            sshpass -p "${SSH_PASSWORD}" ssh \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              "${SSH_USER}@$1" "bash -s" <<< "$2"
          }
          for ip in $STORAGE_PRIVATE_IPS; do
            sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null "${SSH_USER}@${ip}" \
              "nohup reboot >/dev/null 2>&1 &" || true
          done
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "Waiting for $ip..."
            for i in {1..60}; do
              if sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
                -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5 \
                "${SSH_USER}@${ip}" "echo online" >/dev/null 2>&1; then
                echo "$ip online"; break
              fi
              sleep 10
              [[ "$i" -lt 60 ]] || (echo "ERROR: $ip did not come online" && exit 1)
            done
          done
          for ip in $STORAGE_PRIVATE_IPS; do
            echo "---- disk reset on $ip ----"
            run_remote "$ip" "set -euxo pipefail
              for dev in /dev/nvme0n1 /dev/nvme1n1 /dev/nvme2n1 /dev/nvme3n1; do
                if [[ -b \$dev ]]; then
                  parted \$dev --script rm 1 || true
                  parted \$dev --script rm 2 || true
                  parted \$dev --script rm 3 || true
                fi
              done
              for pci in \$(lspci -D | grep 'QEMU NVM Express' | awk '{print \$1}' || true); do
                echo \$pci > /sys/bus/pci/drivers/nvme/unbind || true
              done
              for i in 0 1 2 3; do
                dev=/dev/nvme\${i}n1
                if [[ -b \$dev ]]; then parted -fs \$dev mklabel gpt || true; fi
              done"
          done

      # ============================================================
      # K3S BOOTSTRAP
      # ============================================================
      - name: Clone simplyBlockDeploy
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf simplyBlockDeploy
          git clone https://github.com/simplyblock-io/simplyBlockDeploy.git simplyBlockDeploy
          test -f simplyBlockDeploy/bare-metal/bootstrap-k3s.sh

      - name: Bootstrap K3s cluster
        shell: bash
        run: |
          set -euxo pipefail
          cd simplyBlockDeploy/bare-metal
          chmod +x ./bootstrap-k3s.sh
          extra_args=()
          if [[ -n "${SIMPLY_BLOCK_SPDK_ULTRA_IMAGE-}" ]]; then
            extra_args+=( --spdk-image "${SIMPLY_BLOCK_SPDK_ULTRA_IMAGE}" )
          fi
          if [[ -n "${SIMPLY_BLOCK_DOCKER_IMAGE-}" ]]; then
            extra_args+=( --docker-image "${SIMPLY_BLOCK_DOCKER_IMAGE}" )
          fi
          if [[ -n "${BOOTSTRAP_DATA_NIC:-}" ]]; then
            extra_args+=( --data-nics "${BOOTSTRAP_DATA_NIC}" )
          fi
          export K3S_MNODES="${K3S_MNODES}"
          export STORAGE_PRIVATE_IPS="${STORAGE_PRIVATE_IPS}"
          set +e
          ./bootstrap-k3s.sh --k8s-snode "${extra_args[@]}" | tee bootstrap-k3s.log
          rc=${PIPESTATUS[0]}
          set -e
          [[ "$rc" -eq 0 ]] || (echo "ERROR: bootstrap failed (rc=$rc)" && exit "$rc")

      # ============================================================
      # KUBECONFIG
      # ============================================================
      - name: Copy kubeconfig from K3s master
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.kube
          sshpass -p "${SSH_PASSWORD}" scp \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${SSH_USER}@${K3S_MNODES}:/etc/rancher/k3s/k3s.yaml" ~/.kube/config_k3s
          sed -i "s|127.0.0.1|${K3S_MNODES}|g" ~/.kube/config_k3s
          sed -i "s|localhost|${K3S_MNODES}|g"  ~/.kube/config_k3s
          echo "KUBECONFIG=${HOME}/.kube/config_k3s" >> "$GITHUB_ENV"
          kubectl get nodes

      # ============================================================
      # HELM DEPLOY
      # ============================================================
      - name: Pre-Helm cleanup
        shell: bash
        run: |
          set -euxo pipefail
          NS="${K8S_NAMESPACE}"
          helm uninstall sbcli -n "${NS}" 2>/dev/null || true
          kubectl -n "${NS}" delete pod --all --force --grace-period=0 2>/dev/null || true
          kubectl -n "${NS}" delete pvc --all --force --grace-period=0 2>/dev/null || true
          kubectl delete pv --all --force --grace-period=0 2>/dev/null || true

      - name: Build worker node names for Helm
        shell: bash
        run: |
          set -euxo pipefail
          count=$(echo "${STORAGE_PRIVATE_IPS}" | tr ' ' '\n' | grep -c '\S')
          worker_csv=$(seq 1 "${count}" | sed 's/^/worker/' | tr '\n' ',' | sed 's/,$//')
          echo "HELM_WORKER_NODES={${worker_csv}}" >> "$GITHUB_ENV"

      - name: Clone sbcli charts branch
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf sbcli-charts
          git clone --branch "${K8S_CHARTS_BRANCH}" --single-branch \
            https://github.com/simplyblock-io/sbcli.git sbcli-charts
          test -d sbcli-charts/simplyblock_core/scripts/charts

      - name: Deploy simplyblock via Helm
        shell: bash
        run: |
          set -euxo pipefail
          cd sbcli-charts/simplyblock_core/scripts/charts
          extra_set=()
          if [[ -n "${SIMPLY_BLOCK_DOCKER_IMAGE-}" ]]; then
            extra_set+=( --set "image.repository=${SIMPLY_BLOCK_DOCKER_IMAGE%%:*}" )
            extra_set+=( --set "image.tag=${SIMPLY_BLOCK_DOCKER_IMAGE##*:}" )
          fi
          if [[ -n "${HELM_WORKER_NODES:-}" ]]; then
            extra_set+=( --set "storageNodes.workerNodes=${HELM_WORKER_NODES}" )
          fi
          if [[ -n "${EXTRA_HELM_ARGS:-}" ]]; then
            read -ra extra_caller <<< "${EXTRA_HELM_ARGS}"
            extra_set+=( "${extra_caller[@]}" )
          fi
          helm upgrade --install sbcli \
            --namespace "${K8S_NAMESPACE}" --create-namespace \
            "${extra_set[@]}" ./ | tee helm-install.log

      - name: Wait for admin pod Running
        shell: bash
        run: |
          set -euxo pipefail
          for i in {1..60}; do
            status=$(kubectl get pods -n "${K8S_NAMESPACE}" --no-headers \
              -o custom-columns=:metadata.name,:status.phase \
              | grep simplyblock-admin-control | awk '{print $2}' || true)
            [[ "${status}" == "Running" ]] && echo "Admin pod Running" && break
            echo "Attempt $i: status=${status:-pending}. Waiting 10s..."
            sleep 10
            [[ "$i" -lt 60 ]] || (echo "ERROR: admin pod did not start" && exit 1)
          done

      - name: Wait for cluster active
        shell: bash
        run: |
          set -euxo pipefail
          admin_pod="$(kubectl get pods -n "${K8S_NAMESPACE}" --no-headers \
            -o custom-columns=:metadata.name | grep simplyblock-admin-control | head -1)"
          for i in {1..120}; do
            output="$(kubectl exec -n "${K8S_NAMESPACE}" "${admin_pod}" -- \
              bash -c "${SBCLI_CMD} cluster list" 2>/dev/null || true)"
            echo "${output}" | grep -qi "active" && echo "Cluster active" && break
            echo "Attempt $i: waiting 10s..."
            sleep 10
            [[ "$i" -lt 120 ]] || (echo "ERROR: cluster not active" && exit 1)
          done

      - name: Resolve API_BASE_URL
        shell: bash
        run: |
          set -euxo pipefail
          url="${{ inputs.API_INVOKE_URL }}"
          [[ -z "$url" ]] && url="http://${K3S_MNODES}/"
          echo "API_BASE_URL=${url}" >> "$GITHUB_ENV"
          echo "API_INVOKE_URL=${url}" >> "$GITHUB_ENV"

      - name: Fetch CLUSTER_ID and CLUSTER_SECRET
        shell: bash
        run: |
          set -euxo pipefail
          admin_pod="$(kubectl get pods -n "${K8S_NAMESPACE}" --no-headers \
            -o custom-columns=:metadata.name | grep simplyblock-admin-control | head -1)"
          cluster_id="$(kubectl exec -n "${K8S_NAMESPACE}" "${admin_pod}" -- \
            bash -c "${SBCLI_CMD} cluster list" \
            | grep -Eo '[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}' | head -1 || true)"
          [[ -z "${cluster_id}" ]] && echo "ERROR: no cluster_id" && exit 1
          cluster_secret="$(kubectl exec -n "${K8S_NAMESPACE}" "${admin_pod}" -- \
            bash -c "${SBCLI_CMD} cluster get-secret ${cluster_id}" \
            | tr -d '\r' | tail -n 1 | xargs)"
          [[ -z "${cluster_secret}" ]] && echo "ERROR: no cluster_secret" && exit 1
          echo "CLUSTER_ID=${cluster_id}" >> "$GITHUB_ENV"
          echo "CLUSTER_SECRET=${cluster_secret}" >> "$GITHUB_ENV"

      # ============================================================
      # RUN MONITORING TEST
      # ============================================================
      - name: Clone sbcli repo (test code)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf sbcli
          wf_branch="${{ github.ref_name }}"
          fallback_branch="${SBCLI_BRANCH}"
          if git ls-remote --heads https://github.com/simplyblock-io/sbcli.git "$wf_branch" | grep -q "$wf_branch"; then
            git clone --branch "$wf_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          else
            git clone --branch "$fallback_branch" --single-branch https://github.com/simplyblock-io/sbcli.git sbcli
          fi

      - name: Install Python deps
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m pip install --upgrade pip
          [[ -f "sbcli/e2e/requirements.txt" ]] && pip install -r sbcli/e2e/requirements.txt || true
          pip install matplotlib || true

      - name: Record test start time
        shell: bash
        run: |
          echo "TEST_START_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "TEST_START_HUMAN=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      - name: "Run monitoring test: ${{ matrix.test }}"
        shell: bash
        working-directory: sbcli/e2e
        run: |
          set -euxo pipefail
          run_k8s_flag="${{ inputs.RUN_K8S }}"
          [[ "$run_k8s_flag" == "true" ]] && k8s_arg="--run_k8s True" || k8s_arg=""
          python3 -u stress.py \
            --testname "${TEST_CLASS}" \
            --ndcs "${NDCS}" --npcs "${NPCS}" \
            $k8s_arg \
            2>&1 | tee output.log

      - name: Mark test end time
        if: always()
        shell: bash
        run: |
          echo "TEST_END_EPOCH=$(date +%s)" >> "$GITHUB_ENV"
          echo "TEST_END_HUMAN=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      # ============================================================
      # COLLECT RESULTS
      # ============================================================
      - name: Collect timing JSON artifacts
        if: always()
        shell: bash
        run: |
          set -euxo pipefail
          artifact_dir="monitoring_results/${TEST_CLASS}"
          mkdir -p "${artifact_dir}"
          # Copy any timing JSON files from logs/
          find sbcli/e2e/logs -name '*timing*.json' -exec cp {} "${artifact_dir}/" \; 2>/dev/null || true
          find sbcli/e2e/logs -name '*report*.json' -exec cp {} "${artifact_dir}/" \; 2>/dev/null || true
          # Copy any PNG graphs
          find sbcli/e2e/logs -name '*.png' -exec cp {} "${artifact_dir}/" \; 2>/dev/null || true
          # Copy test output log
          cp sbcli/e2e/output.log "${artifact_dir}/output.log" 2>/dev/null || true
          # Write a meta file with timestamps
          cat > "${artifact_dir}/meta.json" <<METAEOF
          {
            "test_class": "${TEST_CLASS}",
            "start_epoch": ${TEST_START_EPOCH:-0},
            "end_epoch": ${TEST_END_EPOCH:-0},
            "start_human": "${TEST_START_HUMAN:-unknown}",
            "end_human": "${TEST_END_HUMAN:-unknown}",
            "ndcs": ${NDCS},
            "npcs": ${NPCS},
            "job_status": "${{ job.status }}"
          }
          METAEOF
          echo "Artifacts collected in ${artifact_dir}"
          ls -la "${artifact_dir}/"

      - name: Post-test cleanup (kill fio on clients)
        if: always()
        shell: bash
        run: |
          for ip in $CLIENTNODES; do
            sshpass -p "${SSH_PASSWORD}" ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null "${SSH_USER}@${ip}" \
              "pkill -9 fio || true; pkill -9 tmux || true" 2>/dev/null || true
          done

      - name: Upload per-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-${{ matrix.test }}-${{ github.run_id }}
          path: monitoring_results/${{ matrix.test }}/
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Compare results and generate summary
  # ─────────────────────────────────────────────────────────────────────────
  compare-results:
    name: Compare & Summarize
    needs: [setup-matrix, run-tests]
    if: always()
    runs-on: [self-hosted]

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: monitoring-*-${{ github.run_id }}
          path: all_results/
          merge-multiple: false

      - name: Install Python deps for comparison
        shell: bash
        run: |
          pip install matplotlib || true

      - name: Generate comparison summary
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, glob, sys, base64, io
          from pathlib import Path
          from datetime import datetime

          results_dir = Path("all_results")
          tests = []

          # Discover all test result directories
          for test_dir in sorted(results_dir.iterdir()):
              if not test_dir.is_dir():
                  continue
              meta_path = test_dir / "meta.json"
              if not meta_path.exists():
                  continue
              meta = json.loads(meta_path.read_text())
              test_name = meta.get("test_class", test_dir.name)
              start = meta.get("start_epoch", 0)
              end = meta.get("end_epoch", 0)
              duration = max(0, end - start) if end >= start > 0 else 0
              status = meta.get("job_status", "unknown")

              # Find timing JSONs
              timing_files = list(test_dir.glob("*timing*.json")) + list(test_dir.glob("*report*.json"))
              phases = []
              key_metric = duration
              key_metric_label = "total_duration_sec"

              for tf in timing_files:
                  if tf.name == "meta.json":
                      continue
                  try:
                      data = json.loads(tf.read_text())
                      if "phases" in data:
                          phases.extend(data["phases"])
                      if "summary" in data:
                          km = data["summary"].get("key_metric")
                          if km is not None:
                              key_metric = km
                              key_metric_label = data["summary"].get("key_metric_label", "key_metric")
                  except Exception:
                      pass

              tests.append({
                  "name": test_name,
                  "duration": duration,
                  "status": status,
                  "phases": phases,
                  "key_metric": key_metric,
                  "key_metric_label": key_metric_label,
              })

          # Build markdown summary
          lines = []
          lines.append("## Monitoring Suite Results\n")
          lines.append(f"**Tests run:** {len(tests)}\n")

          # Overview table
          lines.append("### Overview\n")
          lines.append("| Test | Duration | Key Metric | Status |")
          lines.append("|------|----------|-----------|--------|")
          for t in tests:
              dur_fmt = f"{t['duration']//3600}h {(t['duration']%3600)//60}m {t['duration']%60}s"
              km = f"{t['key_metric']:.1f}s" if isinstance(t['key_metric'], (int, float)) else str(t['key_metric'])
              icon = ":white_check_mark:" if t["status"] == "success" else ":x:"
              lines.append(f"| {t['name']} | {dur_fmt} | {km} ({t['key_metric_label']}) | {icon} {t['status']} |")

          # Phase details table
          has_phases = any(t["phases"] for t in tests)
          if has_phases:
              lines.append("\n### Phase Breakdown\n")
              lines.append("| Test | Phase | Duration (s) | Status |")
              lines.append("|------|-------|-------------|--------|")
              for t in tests:
                  for p in t["phases"]:
                      lines.append(
                          f"| {t['name']} | {p.get('name', '?')} | "
                          f"{p.get('duration_sec', 0):.1f} | {p.get('status', '?')} |"
                      )

          # Generate bar chart
          try:
              import matplotlib
              matplotlib.use("Agg")
              import matplotlib.pyplot as plt

              if tests:
                  fig, ax = plt.subplots(figsize=(max(8, len(tests) * 2), 5))
                  names = [t["name"] for t in tests]
                  # Shorten long names
                  short_names = [n[:30] + "..." if len(n) > 30 else n for n in names]
                  values = [t["key_metric"] if isinstance(t["key_metric"], (int, float)) else 0 for t in tests]
                  colors = ["#2ecc71" if t["status"] == "success" else "#e74c3c" for t in tests]

                  bars = ax.bar(range(len(tests)), values, color=colors, width=0.6)
                  ax.set_xticks(range(len(tests)))
                  ax.set_xticklabels(short_names, rotation=45, ha="right", fontsize=9)
                  ax.set_ylabel("Key Metric (seconds)")
                  ax.set_title("Monitoring Suite — Key Metrics Comparison")

                  for bar_obj, val in zip(bars, values):
                      ax.text(
                          bar_obj.get_x() + bar_obj.get_width() / 2,
                          bar_obj.get_height() + max(values) * 0.01,
                          f"{val:.0f}s",
                          ha="center", va="bottom", fontsize=8,
                      )

                  plt.tight_layout()
                  buf = io.BytesIO()
                  fig.savefig(buf, format="png", dpi=100)
                  plt.close(fig)
                  buf.seek(0)
                  img_b64 = base64.b64encode(buf.read()).decode("ascii")

                  lines.append("\n### Comparison Chart\n")
                  lines.append(f"![Monitoring Comparison](data:image/png;base64,{img_b64})\n")

          except ImportError:
              lines.append("\n*matplotlib not available — chart skipped*\n")
          except Exception as exc:
              lines.append(f"\n*Chart generation failed: {exc}*\n")

          # Write to GITHUB_STEP_SUMMARY
          summary = "\n".join(lines)
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary_file:
              with open(summary_file, "a") as f:
                  f.write(summary + "\n")
          print(summary)
          PYEOF

      - name: Upload comparison artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-comparison-${{ github.run_id }}
          path: all_results/
          if-no-files-found: warn

      - name: Send Slack notification
        if: always()
        shell: bash
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JOB_STATUS: ${{ needs.run-tests.result }}
          SLACK_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, urllib.request
          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
              print("No SLACK_WEBHOOK_URL; skipping."); sys.exit(0)
          ok = os.environ.get("JOB_STATUS", "") == "success"
          icon = ":white_check_mark:" if ok else ":x:"
          status = "SUCCESS" if ok else "FAILURE"
          mention = "" if ok else " <!channel>"
          branch = os.environ.get("GITHUB_REF_NAME", "?")
          run_url = os.environ.get("SLACK_RUN_URL", "")
          tests_input = "${{ inputs.TEST_CLASSES }}"
          lines = [
              f"{icon} *Monitoring Suite*{mention}",
              f"*Status:* {status}",
              f"*Branch:* `{branch}`  |  *Tests:* `{tests_input}`",
              f":link: *Run:* <{run_url}|View on GitHub>",
          ]
          payload = {"text": "\n".join(lines)}
          req = urllib.request.Request(
              webhook, data=json.dumps(payload).encode(),
              headers={"Content-Type": "application/json"})
          try:
              urllib.request.urlopen(req, timeout=15)
              print("Slack notification sent.")
          except Exception as exc:
              print(f"WARN: Slack failed: {exc}", file=sys.stderr)
          PYEOF
