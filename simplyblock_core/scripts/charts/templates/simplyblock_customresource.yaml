{{- if .Values.simplyblock.cluster }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockStorageCluster
metadata:
  name: {{ .Values.simplyblock.cluster.clusterName }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}

  {{- if .Values.simplyblock.cluster.mgmtIfc }}
  mgmtIfc: {{ .Values.simplyblock.cluster.mgmtIfc }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.fabric }}
  fabric: {{ .Values.simplyblock.cluster.fabric }}
  {{- end }}

  {{- if hasKey .Values.simplyblock.cluster "stripeWdata" }}
  stripeWdata: {{ .Values.simplyblock.cluster.stripeWdata }}
  {{- end }}

  {{- if hasKey .Values.simplyblock.cluster "stripeWparity" }}
  stripeWparity: {{ .Values.simplyblock.cluster.stripeWparity }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.haType }}
  haType: {{ .Values.simplyblock.cluster.haType }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.clientDataNic }}
  clientDataNic: {{ .Values.simplyblock.cluster.clientDataNic }}
  {{- end }}

  {{- if hasKey .Values.simplyblock.cluster "isSingleNode" }}
  isSingleNode: {{ .Values.simplyblock.cluster.isSingleNode }}
  {{- end }}

  {{- if hasKey .Values.simplyblock.cluster "enableNodeAffinity" }}
  enableNodeAffinity: {{ .Values.simplyblock.cluster.enableNodeAffinity }}
  {{- end }}

  {{- if hasKey .Values.simplyblock.cluster "strictNodeAntiAffinity" }}
  strictNodeAntiAffinity: {{ .Values.simplyblock.cluster.strictNodeAntiAffinity }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.capWarn }}
  capWarn: {{ .Values.simplyblock.cluster.capWarn }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.capCrit }}
  capCrit: {{ .Values.simplyblock.cluster.capCrit }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.provCapWarn }}
  provCapWarn: {{ .Values.simplyblock.cluster.provCapWarn }}
  {{- end }}

  {{- if .Values.simplyblock.cluster.provCapCrit }}
  provCapCrit: {{ .Values.simplyblock.cluster.provCapCrit }}
  {{- end }}
{{- end }}

---
{{- if .Values.simplyblock.pool }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockPool
metadata:
  name: {{ .Values.simplyblock.pool.name }}
  namespace: {{ .Release.Namespace }}
spec:
  name: {{ .Values.simplyblock.pool.name }}
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}

  {{- if .Values.simplyblock.pool.capacityLimit }}
  capacityLimit: {{ .Values.simplyblock.pool.capacityLimit | quote }}
  {{- end }}
{{- end }}

---
{{- if .Values.simplyblock.lvol }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockLvol
metadata:
  name: {{ .Values.simplyblock.lvol.name }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}
  poolName: {{ .Values.simplyblock.pool.name }}
{{- end }}

---
{{- $storageNodes := .Values.simplyblock.storageNodes }}
{{- $workerNodes := default (list) $storageNodes.workerNodes }}
{{- $hasStorageNodeAction := and (hasKey $storageNodes "action") (ne (default "" $storageNodes.action) "") }}
{{- $canRenderStorageNode := and $storageNodes (or $hasStorageNodeAction (and $storageNodes.clusterImage (hasKey $storageNodes "maxLVol") (gt (len $workerNodes) 0))) }}
{{- if $canRenderStorageNode }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockStorageNode
metadata:
  name: {{ $storageNodes.name }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}

  {{- if $hasStorageNodeAction }}
  action: {{ $storageNodes.action }}
  {{- end }}

  {{- if $storageNodes.nodeUUID }}
  nodeUUID: {{ $storageNodes.nodeUUID | quote }}
  {{- end }}

  {{- if $storageNodes.clusterImage }}
  clusterImage: {{ $storageNodes.clusterImage }}
  {{- end }}

  {{- if $storageNodes.mgmtIfc }}
  mgmtIfc: {{ $storageNodes.mgmtIfc }}
  {{- end }}

  {{- $dataNIC := default (list) $storageNodes.dataNIC }}
  {{- if gt (len $dataNIC) 0 }}
  dataNIC:
  {{- range $dataNIC }}
    - {{ . }}
  {{- end }}
  {{- end }}

  {{- if hasKey $storageNodes "maxLVol" }}
  maxLVol: {{ $storageNodes.maxLVol }}
  {{- end }}

  {{- if $storageNodes.maxSize }}
  maxSize: {{ $storageNodes.maxSize | quote }}
  {{- end }}

  {{- if hasKey $storageNodes "nodesPerSocket" }}
  nodesPerSocket: {{ $storageNodes.nodesPerSocket }}
  {{- end }}

  {{- $socketsToUse := default (list) $storageNodes.socketsToUse }}
  {{- if gt (len $socketsToUse) 0 }}
  socketsToUse:
  {{- range $socketsToUse }}
    - {{ . | quote }}
  {{- end }}
  {{- end }}

  {{- if hasKey $storageNodes "partitions" }}
  partitions: {{ $storageNodes.partitions }}
  {{- end }}

  {{- if hasKey $storageNodes "jmPercent" }}
  jmPercent: {{ $storageNodes.jmPercent }}
  {{- end }}

  {{- if hasKey $storageNodes "haJmCount" }}
  haJmCount: {{ $storageNodes.haJmCount }}
  {{- end }}

  {{- if $storageNodes.corePercentage }}
  corePercentage: {{ $storageNodes.corePercentage }}
  {{- end }}

  {{- if hasKey $storageNodes "spdkDebug" }}
  spdkDebug: {{ $storageNodes.spdkDebug }}
  {{- end }}

  {{- if $storageNodes.spdkImage }}
  spdkImage: {{ $storageNodes.spdkImage }}
  {{- end }}

  {{- if $storageNodes.spdkProxyImage }}
  spdkProxyImage: {{ $storageNodes.spdkProxyImage }}
  {{- end }}

  {{- if $storageNodes.driveSizeRange }}
  driveSizeRange: {{ $storageNodes.driveSizeRange | quote }}
  {{- end }}

  {{- if $storageNodes.pcieModel }}
  pcieModel: {{ $storageNodes.pcieModel | quote }}
  {{- end }}

  {{- if hasKey $storageNodes "format4k" }}
  format4k: {{ $storageNodes.format4k }}
  {{- end }}

  {{- if hasKey $storageNodes "haJM" }}
  haJM: {{ $storageNodes.haJM }}
  {{- end }}

  {{- if hasKey $storageNodes "idDeviceByNQN" }}
  idDeviceByNQN: {{ $storageNodes.idDeviceByNQN }}
  {{- end }}

  {{- if hasKey $storageNodes "force" }}
  force: {{ $storageNodes.force }}
  {{- end }}

  {{- if $storageNodes.nodeAddr }}
  nodeAddr: {{ $storageNodes.nodeAddr | quote }}
  {{- end }}

  {{- if $storageNodes.workerNode }}
  workerNode: {{ $storageNodes.workerNode | quote }}
  {{- end }}

  {{- if hasKey $storageNodes "coreIsolation" }}
  coreIsolation: {{ $storageNodes.coreIsolation }}
  {{- end }}

  {{- if hasKey $storageNodes "skipKubeletConfiguration" }}
  skipKubeletConfiguration: {{ $storageNodes.skipKubeletConfiguration }}
  {{- end }}

  {{- if hasKey $storageNodes "enableCpuTopology" }}
  enableCpuTopology: {{ $storageNodes.enableCpuTopology }}
  {{- end }}

  {{- if hasKey $storageNodes "openShiftCluster" }}
  openShiftCluster: {{ $storageNodes.openShiftCluster }}
  {{- end }}

  {{- if hasKey $storageNodes "ubuntuHost" }}
  ubuntuHost: {{ $storageNodes.ubuntuHost }}
  {{- end }}

  {{- if $storageNodes.reservedSystemCPU }}
  reservedSystemCPU: {{ $storageNodes.reservedSystemCPU | quote }}
  {{- end }}

  {{- if hasKey $storageNodes "useSeparateJournalDevice" }}
  useSeparateJournalDevice: {{ $storageNodes.useSeparateJournalDevice }}
  {{- end }}

  {{- if $storageNodes.coreMask }}
  coreMask: {{ $storageNodes.coreMask | quote }}
  {{- end }}

  {{- $deviceNames := default (list) $storageNodes.deviceNames }}
  {{- if gt (len $deviceNames) 0 }}
  deviceNames:
  {{- range $deviceNames }}
    - {{ . }}
  {{- end }}
  {{- end }}

  {{- $pcieAllowList := default (list) $storageNodes.pcieAllowList }}
  {{- if gt (len $pcieAllowList) 0 }}
  pcieAllowList:
  {{- range $pcieAllowList }}
    - {{ . }}
  {{- end }}
  {{- end }}

  {{- $pcieDenyList := default (list) $storageNodes.pcieDenyList }}
  {{- if gt (len $pcieDenyList) 0 }}
  pcieDenyList:
  {{- range $pcieDenyList }}
    - {{ . }}
  {{- end }}
  {{- end }}

  {{- $tolerations := default (list) $storageNodes.tolerations }}
  {{- if gt (len $tolerations) 0 }}
  tolerations:
{{ toYaml $tolerations | nindent 4 }}
  {{- end }}

  {{- if gt (len $workerNodes) 0 }}
  workerNodes:
  {{- range $workerNodes }}
    - {{ . }}
  {{- end }}
  {{- end }}
{{- end }}

---
{{- if .Values.simplyblock.devices }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockDevice
metadata:
  name: {{ .Values.simplyblock.devices.name }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}
{{- end }}

---
{{- if .Values.simplyblock.tasks }}
apiVersion: simplyblock.simplyblock.io/v1alpha1
kind: SimplyBlockTask
metadata:
  name: {{ .Values.simplyblock.tasks.name }}
  namespace: {{ .Release.Namespace }}
spec:
  clusterName: {{ .Values.simplyblock.cluster.clusterName }}
{{- end }}
