  name: simplyblock-fluent-bit
  namespace: {{ .Release.Namespace }}
  labels:
    app: simplyblock-fluent-bit
spec:
  selector:
    matchLabels:
      app: simplyblock-fluent-bit
  template:
    metadata:
      labels:
        app: simplyblock-fluent-bit
    spec:
      {{- if .Values.nodeSelector.create }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.create }}
      tolerations:
      {{- range .Values.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:1.8.11
          securityContext:
            privileged: true
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/
          resources:
            requests:
              cpu: "200m"
              memory: "400Mi"
            limits:
              cpu: "400m"
              memory: "1Gi"
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config
          configMap:
            name: simplyblock-fluent-bit-config
