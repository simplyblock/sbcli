---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplyblock-admin-control
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simplyblock-admin-control
  template:
    metadata:
      annotations:
        log-collector/enabled: "true"
        reloader.stakater.com/auto: "true"
        reloader.stakater.com/configmap: "simplyblock-fdb-cluster-config"
      labels:
        app: simplyblock-admin-control
    spec:
      serviceAccountName: simplyblock-control-sa
      {{- if .Values.nodeSelector.create }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.create }}
      tolerations:
      {{- range .Values.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet 
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: simplyblock-admin-control
              topologyKey: kubernetes.io/hostname
      containers:
      - name: simplyblock-control
        image: "{{ .Values.image.simplyblock.repository }}:{{ .Values.image.simplyblock.tag }}"
        imagePullPolicy: "{{ .Values.image.simplyblock.pullPolicy }}"
        command: ["/bin/bash", "-c", "trap : TERM INT; sleep infinity & wait"]
        env:
        - name: LVOL_NVMF_PORT_START
          value: "{{ .Values.ports.lvolNvmfPortStart }}"
        - name: PROMETHEUS_URL
          value: "{{ .Values.prometheus.simplyblock.prometheusURL }}"
        - name: PROMETHEUS_PORT
          value: "{{ .Values.prometheus.simplyblock.prometheusPORT }}"
        - name: K8S_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
{{- if .Values.monitoring.enabled }}
        - name: MONITORING_SECRET
          valueFrom:
            secretKeyRef:
              name: simplyblock-grafana-secrets
              key: MONITORING_SECRET
{{- end }}
        - name: SIMPLYBLOCK_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: simplyblock-config
              key: LOG_LEVEL
        volumeMounts:
        - name: fdb-cluster-file
          mountPath: /etc/foundationdb/fdb.cluster
          subPath: fdb.cluster
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "600m"
            memory: "1Gi"
      volumes:
      - name: fdb-cluster-file
        configMap:
          name: simplyblock-fdb-cluster-config
          items:
            - key: cluster-file
              path: fdb.cluster
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: simplyblock-webappapi
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    matchLabels:
      app: simplyblock-webappapi
  template:
    metadata:
      annotations:
        log-collector/enabled: "true"
        reloader.stakater.com/auto: "true"
        reloader.stakater.com/configmap: "simplyblock-fdb-cluster-config"
      labels:
        app: simplyblock-webappapi
    spec:
      {{- if .Values.nodeSelector.create }}
      nodeSelector:
        {{ .Values.nodeSelector.key }}: {{ .Values.nodeSelector.value }}
      {{- end }}
      {{- if .Values.tolerations.create }}
      tolerations:
      {{- range .Values.tolerations.list }}
      - operator: {{ .operator | quote }}
        {{- if .effect }}
        effect: {{ .effect | quote }}
        {{- end }}
        {{- if .key }}
        key: {{ .key | quote }}
        {{- end }}
        {{- if .value }}
        value: {{ .value | quote }}
        {{- end }}
      {{- end }}
      {{- end }}
      containers:
      - name: webappapi
        image: "{{ .Values.image.simplyblock.repository }}:{{ .Values.image.simplyblock.tag }}"
        imagePullPolicy: "{{ .Values.image.simplyblock.pullPolicy }}"
        ports:
        - containerPort: 5000
        command: ["python", "simplyblock_web/app.py"]
        env:
        - name: SIMPLYBLOCK_LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: simplyblock-config
              key: LOG_LEVEL
        - name: FLASK_DEBUG
          value: "False"
        - name: FLASK_ENV
          value: "production"
        - name: PROMETHEUS_URL
          value: "{{ .Values.prometheus.simplyblock.prometheusURL }}"
        - name: PROMETHEUS_PORT
          value: "{{ .Values.prometheus.simplyblock.prometheusPORT }}"
        volumeMounts:
        - name: fdb-cluster-file
          mountPath: /etc/foundationdb/fdb.cluster
          subPath: fdb.cluster
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "2Gi"
      volumes:
      - name: fdb-cluster-file
        configMap:
          name: simplyblock-fdb-cluster-config
          items:
            - key: cluster-file
              path: fdb.cluster
