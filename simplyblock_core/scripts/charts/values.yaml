    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - ingress
            topologyKey: "kubernetes.io/hostname"
    nodeSelector: {}
  defaultBackend:
    enabled: false
    name: defaultbackend
    image:
      registry: "quay.io/simplyblock-io"
      image: defaultbackend-amd64
      tag: "1.5"

